<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Search</title>
    <style>
        /* Base page styling for a minimalist layout */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            font-family: sans-serif;
        }

        /* The flex container that locks the items on one line */
        .search-container {
            display: flex;
            width: 100%;
            max-width: 450px;
            gap: 8px;
            padding: 0 15px;
            box-sizing: border-box;
        }

        /* Text Input Styling */
        input[type="text"] {
            font-size: 18px;
            padding: 12px;
            box-sizing: border-box;
            flex: 1;
            width: 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* Submit Button Styling */
        input[type="submit"] {
            font-size: 18px;
            padding: 12px 20px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #f8f9fa;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Standard HTML Form connecting safely to Google Search -->
    <form action="https://google.com" method="get" style="width: 100%; display: flex; justify-content: center;">
        <div class="search-container">
            <!-- autocomplete="off" stops your 20-year history drop-down -->
            <input type="text" name="q" autocomplete="off" placeholder="Search Google...">
            <input type="submit" value="Search">
        </div>
    </form>

</body>
</html>
